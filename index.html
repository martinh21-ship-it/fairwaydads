    hcpI.oninput=e=>{const v=parseFloat(e.target.value);p.hcp=isNaN(v)?0:Math.round(v*10)/10;};
    hcpI.onblur=()=>{cloudUpdatePlayer(p).catch(()=>{});save();render();};
    hcRow.appendChild(hcpI);
    hcRow.appendChild(el("div","mini muted","Your decimal handicap index (e.g. 14.6). New rounds lock in this value."));
    ec.appendChild(hcRow);
    // photo
    const photoBtn=el("button","btn btn-ghost btn-sm",p.photo?"📷 Change photo":"📷 Add photo");
    photoBtn.style.cssText="width:100%;margin-top:12px";
    const fileIn=el("input");fileIn.type="file";fileIn.accept="image/*";fileIn.style.display="none";
    fileIn.onchange=async e=>{
      const f=e.target.files[0];if(!f)return;
      photoBtn.textContent="⏳ Uploading…";photoBtn.disabled=true;
      try{ const url=await uploadPhoto(f,"profile"); p.photo=url; await cloudUpdatePlayer(p); toast("Photo updated 📸");save();render(); }
      catch(err){toast("Upload failed — try again");photoBtn.textContent="📷 Change photo";photoBtn.disabled=false;}
    };
    photoBtn.onclick=()=>fileIn.click();
    ec.appendChild(photoBtn);ec.appendChild(fileIn);
    // remove dad (tucked at the bottom of edit)
    const rm=el("button","del","Remove this dad");rm.style.marginTop="6px";
    rm.onclick=()=>{ if(confirm(`Remove ${p.name}? This can't be undone.`)){
      cloudDeletePlayer(p.id).catch(()=>{});
      S.players=S.players.filter(x=>x.id!==p.id);
      if(S.meId===p.id)S.meId=null;
      S.editProfile=false;save();S.tab="dads";render();
    }};
    ec.appendChild(rm);
    w.appendChild(ec);
  }

  // headline metrics
  const standing=seasonStandings().find(s=>s.id===p.id);
  const wins=standing?standing.wins:0;
  // best (lowest) — split by 9 vs 18 holes AND gross vs net, completed rounds only
  let best9g=null,best18g=null,best9n=null,best18n=null;
  allRounds().filter(r=>r.players.includes(p.id)).forEach(r=>{
    const holes=holesInPlayFor(r);
    const complete=holes.length>0 && holes.every(h=>r.scores?.[p.id]?.[h.n]!=null);
    if(!complete)return;
    const g=gross(r,p.id), n=netTotalFor(r,p.id);
    if(g<=0)return;
    if(r.holes===9){ if(best9g===null||g<best9g)best9g=g; if(best9n===null||n<best9n)best9n=n; }
    else { if(best18g===null||g<best18g)best18g=g; if(best18n===null||n<best18n)best18n=n; }
  });

  const head=el("div","card");
  head.style.cssText="position:relative;padding:0;overflow:hidden";
  const photoBlock = p.photo
    ? `<img src="${p.photo}" alt="${p.name}" style="width:100%;height:240px;object-fit:cover;display:block" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
       <div style="display:none;width:100%;height:240px;background:${p.color};align-items:center;justify-content:center;font-size:80px;font-weight:900;color:#fff;font-family:'Oswald'">${initials(p.name)}</div>`
    : `<div style="width:100%;height:240px;background:linear-gradient(150deg, ${p.color}, var(--green-700));display:flex;align-items:center;justify-content:center;font-size:90px;font-weight:900;color:#fff;font-family:'Oswald'">${initials(p.name)}</div>`;
  head.innerHTML=`
    <div style="position:relative">
      ${photoBlock}
      <div style="position:absolute;inset:0;background:linear-gradient(180deg, rgba(10,20,16,0) 45%, rgba(10,20,16,.92) 100%)"></div>
      <div style="position:absolute;left:16px;right:16px;bottom:14px">
        <div class="display" style="font-size:32px;color:var(--cream);text-shadow:0 2px 12px rgba(0,0,0,.8);line-height:1">${p.name}</div>
        <div class="cond" style="color:var(--gold);font-size:13px;font-weight:600;margin-top:3px;text-shadow:0 1px 6px rgba(0,0,0,.9)">HANDICAP ${p.hcp}</div>
      </div>
    </div>
    <div class="metric-row" style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.08)">
      <div class="rounds-tile" style="background:var(--green-800);padding:12px 6px;text-align:center;cursor:pointer">
        <div class="serif" style="font-size:24px;font-weight:900;color:var(--cream)">${st.rounds}</div>
        <div class="mini" style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)">Rounds <span style="opacity:.6">›</span></div>
      </div>
      ${[["Wins",wins],["Birdies",st.birdies]].map(([l,v])=>`
        <div style="background:var(--green-800);padding:12px 6px;text-align:center">
          <div class="serif" style="font-size:24px;font-weight:900;color:var(--cream)">${v}</div>
          <div class="mini muted" style="font-size:9px;letter-spacing:.1em;text-transform:uppercase">${l}</div>
        </div>`).join('')}
      <div class="best-tile" style="background:var(--green-800);padding:12px 6px;text-align:center;cursor:pointer">
        <div class="serif best-val" style="font-size:24px;font-weight:900;color:var(--cream)">–</div>
        <div class="mini best-lbl" style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)">Best</div>
      </div>
    </div>`;
  w.appendChild(head);

  // tap Rounds -> dad's rounds list (scorecards, newest first)
  setTimeout(()=>{
    const rt=head.querySelector('.rounds-tile');
    if(rt)rt.onclick=()=>{ S.dadRoundsId=p.id; S.tab="dadrounds"; render(); };
  },0);

  // wire the Best tile to cycle through available views (9/18 × gross/net)
  setTimeout(()=>{
    const tile=head.querySelector('.best-tile');
    if(!tile)return;
    const valEl=tile.querySelector('.best-val'), lblEl=tile.querySelector('.best-lbl');
    // build the list of views that actually have data, defaulting to 9-hole net first
    const views=[];
    if(best9n!=null)views.push({v:best9n,lbl:"Best 9 net"});
    if(best9g!=null)views.push({v:best9g,lbl:"Best 9 gross"});
    if(best18n!=null)views.push({v:best18n,lbl:"Best 18 net"});
    if(best18g!=null)views.push({v:best18g,lbl:"Best 18 gross"});
    let i=0;
    const paint=()=>{
      if(!views.length){valEl.textContent='–';lblEl.textContent='Best';return;}
      const cur=views[i];
      valEl.textContent=cur.v;
      lblEl.innerHTML=`${cur.lbl} ${views.length>1?'<span style="opacity:.6">⇄</span>':''}`;
    };
    paint();
    tile.onclick=()=>{ if(views.length>1){i=(i+1)%views.length;paint();} };
  },0);

  if(st.holes===0){
    w.appendChild(el("div","card empty",`<div class="ico">📊</div>No stats yet — play a round and ${p.name.split(' ')[0]}'s profile fills up.`));
    return w;
  }

  // ---- award badges this dad holds ----
  const myAwards=[];
  if(awards.mostBirdies?.pid===p.id)myAwards.push(["🐦","Birdie Machine",`${awards.mostBirdies.v} birdies`]);
  if(awards.mostEagles?.pid===p.id)myAwards.push(["🦅","Eagle Eye",`${awards.mostEagles.v} eagle${awards.mostEagles.v!==1?'s':''}`]);
  if(awards.longestStreak?.pid===p.id)myAwards.push(["🔥","On Fire",`${awards.longestStreak.v} in a row`]);
  if(awards.mostPars?.pid===p.id)myAwards.push(["🎯","Mr Consistent",`${awards.mostPars.v} pars`]);
  if(awards.biggestBlowup?.pid===p.id)myAwards.push(["💣","Snowman Award",`+${awards.biggestBlowup.v} on a hole`]);
  if(myAwards.length){
    const ac=el("div","card");
    ac.innerHTML=`<div class="eyebrow">Badges</div>`;
    const row=el("div","scroll-x");row.style.marginTop="6px";
    myAwards.forEach(([ico,title,sub])=>{
      const b=el("div","matchcard card tight");b.style.width="150px";b.style.flex="none";b.style.margin="0";
      b.innerHTML=`<div style="font-size:30px">${ico}</div><div style="font-weight:700;margin-top:4px">${title}</div><div class="mini muted">${sub}</div>`;
      row.appendChild(b);
    });
    ac.appendChild(row);
    w.appendChild(ac);
  }

  // ---- scoring breakdown: counters + ring ----

  bc.innerHTML=`<div class="eyebrow">Scoring breakdown</div>`;
  const ringRow=el("div","row");ringRow.style.gap="16px";ringRow.style.marginTop="8px";

  const counts=el("div");counts.style.flex="1";
  const rows=[["Eagles",st.eagles,"var(--gold)"],["Birdies",st.birdies,"var(--clay)"],
    ["Pars",st.pars,"var(--cream)"],["Bogeys",st.bogeys,"var(--cream-dim)"],
    ["Doubles+",st.doubles+st.others,"var(--clay)"]];
  rows.forEach(([l,v,c])=>{
    counts.appendChild(el("div","row between",`<span class="mini"><span class="dot" style="background:${c}"></span>${l}</span><span class="serif" style="font-weight:900;color:${c}">${v}</span>`));
  });
  ringRow.appendChild(counts);
  bc.appendChild(ringRow);
  w.appendChild(bc);

  // ---- score trend with 9/18 and gross/net toggles ----
  const has9=st.trend.some(t=>t.holes===9), has18=st.trend.some(t=>t.holes===18);

    // filter to the chosen hole length, map to chosen metric (sparkline reads .net)

    if(hist.length>=2){

      hc.appendChild(sparkline(hist.map(h=>({net:h.hcp,date:h.date})), "Hcp"));
      const first=hist[0].hcp,last=hist[hist.length-1].hcp;
      const moved=last-first;
      const word = moved<0?`▼ down ${Math.abs(moved)} since you started tracking`:moved>0?`▲ up ${moved}`:"holding steady";
      hc.appendChild(el("div","mini muted",`<span style="color:${moved<0?'var(--lime)':moved>0?'var(--clay)':'var(--cream-dim)'}">${word}</span>`));
    }

    [...hist].reverse().forEach((h,i,arr)=>{

      const isNow = i===0;

  // ---- head to head ----
  const h2h=headToHead(p.id);

    oppIds.forEach(oid=>{

      row.innerHTML=`${avatarHTML(o,34)}

        <div class="serif" style="font-size:18px;font-weight:900;color:${rec.w>=rec.l?'var(--lime)':'var(--clay)'}">${rec.w}–${rec.l}</div>`;
      hc.appendChild(row);
    });
    w.appendChild(hc);
  }

  // ---- nemesis hole + best hole ----
  const nc=el("div","card");
  nc.innerHTML=`<div class="eyebrow">Signature holes</div>`;
  if(st.bestHole){

    nc.appendChild(el("div","row between",`<span class="mini">🌟 Best: <b>${h.name}</b> <span class="muted">(${COURSES[h.course].short} ${h.n})</span></span><span style="color:var(--lime);font-weight:700">${fmtVsPar(st.bestHole.d)}</span>`));
  }
  if(st.nemesis){

    nc.appendChild(el("div","row between",`<span class="mini">😤 Nemesis: <b>${h.name}</b> <span class="muted">(${COURSES[h.course].short} ${h.n})</span></span><span style="color:var(--clay);font-weight:700">+${st.nemesis.avg.toFixed(1)}/rd</span>`));
    nc.appendChild(el("div","mini muted",`Averages ${st.nemesis.avg>0?'+':''}${st.nemesis.avg.toFixed(1)} vs par there over ${st.nemesis.n} plays. There's your ammunition. 🎯`));
  }
  w.appendChild(nc);

  // ---- course records held ----
  const recs=courseRecordsHeldBy(p.id);
  if(recs.length){
    const rc=el("div","card");
    rc.innerHTML=`<div class="eyebrow">🏆 Course records held · ${recs.length}</div>`;
    recs.slice(0,8).forEach(r=>{

    w.appendChild(rc);
  }

async function initRadar(){
  const box=document.getElementById("radarmap");
  if(!box || typeof L==="undefined"){ return; }
  // reset any prior state (the map div is freshly rebuilt each render)
  stopRadar();
  if(RADAR_MAP){ try{RADAR_MAP.remove();}catch(e){} }
  RADAR_MAP=null; RADAR_LAYERS={}; RADAR_FRAMES=[]; RADAR_IDX=0;
  try{
    // centre on user if known, else on the course
    const centre = userPos || (COURSES.allander && COURSES.allander.centre) || [55.97,-4.35];
    RADAR_MAP=L.map("radarmap",{zoomControl:false,attributionControl:false}).setView(centre, 9);
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19}).addTo(RADAR_MAP);
    L.control.zoom({position:"bottomright"}).addTo(RADAR_MAP);
  }catch(e){ console.warn("radar map failed",e); return; }

  // fetch RainViewer frame index (past + nowcast)
  try{
    const r=await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const data=await r.json();
    RADAR_HOST=data.host;
    const past=(data.radar&&data.radar.past)||[];
    const now=(data.radar&&data.radar.nowcast)||[];
    RADAR_FRAMES=past.concat(now);
    if(!RADAR_FRAMES.length)throw new Error("no frames");
    RADAR_IDX=Math.max(0,past.length-1); // start at "now"
    const scrub=document.getElementById("radarscrub");
    if(scrub){scrub.max=String(RADAR_FRAMES.length-1);scrub.value=String(RADAR_IDX);scrub.oninput=()=>{stopRadar();showFrame(+scrub.value);};}
    const play=document.getElementById("radarplay");
    if(play)play.onclick=toggleRadar;
    showFrame(RADAR_IDX);
    startRadarLoop();
  }catch(e){
    console.warn("radar frames failed",e);
    const t=document.getElementById("radartime");
    if(t)t.textContent="Radar unavailable right now — map shown without rain.";
  }
}
function radarTileUrl(frame){
  // 256px tiles, colour scheme 4 (universal blue→red), smooth+snow
  return `${RADAR_HOST}${frame.path}/256/{z}/{x}/{y}/4/1_1.png`;
}
function showFrame(i){
  if(!RADAR_MAP||!RADAR_FRAMES[i])return;
  RADAR_IDX=i;
  const frame=RADAR_FRAMES[i];
  // add this frame's layer if not already, fade others out
  if(!RADAR_LAYERS[i]){
    RADAR_LAYERS[i]=L.tileLayer(radarTileUrl(frame),{opacity:0,zIndex:5});
    RADAR_LAYERS[i].addTo(RADAR_MAP);
  }
  Object.entries(RADAR_LAYERS).forEach(([k,layer])=>{ layer.setOpacity(+k===i?0.7:0); });
  const scrub=document.getElementById("radarscrub");if(scrub)scrub.value=String(i);
  const t=document.getElementById("radartime");
  if(t){
    const d=new Date(frame.time*1000);
    const past=RADAR_FRAMES.filter((f,idx)=>idx<i).length;
    const isFuture = frame.time*1000 > Date.now();
    t.textContent=(isFuture?"Forecast ":"")+d.toLocaleTimeString('en-GB',{hour:'numeric',minute:'2-digit'});
  }
}
function startRadarLoop(){
  stopRadar();
  RADAR_TIMER=setInterval(()=>{
    let next=RADAR_IDX+1;
    if(next>=RADAR_FRAMES.length)next=0;
    showFrame(next);
  },700);
  const play=document.getElementById("radarplay");if(play)play.textContent="⏸ Pause";
}
function stopRadar(){
  if(RADAR_TIMER)clearInterval(RADAR_TIMER);
  RADAR_TIMER=null;
  const play=document.getElementById("radarplay");if(play)play.textContent="▶ Play";
}
function toggleRadar(){ if(RADAR_TIMER)stopRadar(); else startRadarLoop(); }

function breakdownRing(st){
  const segs=[[st.eagles,"var(--gold)"],[st.birdies,"var(--clay)"],[st.pars,"#f5f0e1"],
    [st.bogeys,"#8a9a8e"],[st.doubles+st.others,"#5a3a2a"]];
  const total=segs.reduce((a,s)=>a+s[0],0)||1;
  const R=42,C=2*Math.PI*R;let off=0;
  let circles="";
  segs.forEach(([v,col])=>{
    if(v<=0)return;
    const len=v/total*C;
    circles+=`<circle cx="50" cy="50" r="${R}" fill="none" stroke="${col}" stroke-width="14"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 50 50)"/>`;
    off+=len;
  });
  const wrap=el("div");wrap.style.flex="none";
  wrap.innerHTML=`<svg width="104" height="104" viewBox="0 0 100 100">${circles}
    <text x="50" y="46" text-anchor="middle" fill="#f5f0e1" font-size="20" font-weight="800" font-family="Fraunces">${st.holes}</text>
    <text x="50" y="62" text-anchor="middle" fill="#9bc234" font-size="9" letter-spacing="1">HOLES</text></svg>`;
  return wrap;
}

// simple sparkline; lower is better so we don't invert
function sparkline(data, label){
  // data: array of {net, date}. `label` (e.g. "Net","Gross","Hcp") describes the value.
  label = label || "";
  const vals=data.map(d=>d.net);
  const wd=300,ht=90,pad=14;
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>{
    const x=pad+(i/(vals.length-1||1))*(wd-2*pad);
    const y=pad+((v-min)/rng)*(ht-2*pad); // higher score lower on chart
    return [x,y];
  });
  const path=pts.map((pt,i)=>(i?'L':'M')+pt[0].toFixed(1)+' '+pt[1].toFixed(1)).join(' ');
  const wrap=el("div");wrap.style.marginTop="8px";

  // readout shown above the chart when a point is selected
  const readout=el("div","");readout.style.cssText="text-align:center;height:20px;margin-bottom:2px;font-size:13px;color:var(--gold);font-weight:700;transition:.1s";
  readout.textContent="Tap a point to see that round";
  wrap.appendChild(readout);

  const dotsSvg=pts.map((pt,i)=>
    `<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="9" fill="transparent" class="spark-hit" data-i="${i}" style="cursor:pointer"/>
     <circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="3" fill="var(--gold)" class="spark-dot" data-dot="${i}"/>`
  ).join('');

  const svgWrap=el("div");
  svgWrap.innerHTML=`<svg width="100%" viewBox="0 0 ${wd} ${ht}" preserveAspectRatio="none" style="display:block;overflow:visible">
    <path d="${path}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dotsSvg}</svg>`;
  wrap.appendChild(svgWrap);

  // interactivity: tap a point -> show its net score and date, and enlarge the dot
  const show=(i)=>{
    const d=data[i];
    const dt=new Date(d.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    readout.textContent=`${label?label+' ':''}${d.net} · ${dt}`;
    svgWrap.querySelectorAll('.spark-dot').forEach(c=>{
      const on=c.getAttribute('data-dot')==String(i);
      c.setAttribute('r',on?'5.5':'3');
      c.setAttribute('fill',on?'var(--cream)':'var(--gold)');
    });
  };
  setTimeout(()=>{
    svgWrap.querySelectorAll('.spark-hit').forEach(h=>{
      const i=+h.getAttribute('data-i');
      h.addEventListener('click',()=>show(i));
      h.addEventListener('mouseenter',()=>show(i));
    });
  },0);
  return wrap;
}

function ensurePins(){
  Object.entries(COURSES).forEach(([k,c])=>{

        h.green=[c.centre[0]+Math.cos(ang)*0.006, c.centre[1]+Math.sin(ang)*0.010];

  // shot tracking readout
  const shot=el("div","card tight hidden");shot.id="shotcard";
  shot.innerHTML=`<div class="row between"><div><div class="eyebrow">Tapped point</div><div class="serif" style="font-size:18px" id="shotdist">—</div></div>
    <button class="btn btn-ghost btn-sm" id="clearshot">Clear</button></div>`;
  w.appendChild(shot);

  // controls
  const loc=el("button","btn btn-primary","📍 Use my location");
  loc.onclick=startGps;
  w.appendChild(loc);

  // pin status + single-tap capture
  const pinCard=el("div","card");
  if(hole.approx){
    pinCard.style.borderColor="rgba(232,184,75,.35)";
    pinCard.innerHTML=`<div class="row between" style="margin-bottom:10px"><span class="eyebrow" style="color:var(--gold)">⚠ Green not set yet</span><span class="mini muted">approx</span></div>
      <div class="mini muted" style="margin-bottom:12px">Stand on or beside this green and tap once. It saves the location for the <b>whole group</b> — any dad only has to do each green once, ever.</div>`;
  } else {
    pinCard.style.borderColor="rgba(52,163,90,.4)";
    pinCard.innerHTML=`<div class="row between" style="margin-bottom:10px"><span class="eyebrow" style="color:var(--green-400)">✓ Green set</span><span class="mini muted">accurate</span></div>
      <div class="mini muted" style="margin-bottom:12px">Yardages for this hole are locked in for everyone. Standing on the green again will update it.</div>`;
  }
  const setpin=el("button","btn btn-gold",hole.approx?"🎯 Tap here to set this green":"↻ Re-set this green");
  setpin.onclick=()=>setPinHere(hole);
  pinCard.appendChild(setpin);

  // set the tee box too — pairs with the green
  const setTee=el("button","btn btn-ghost",hole.tee?"↻ Re-set the tee":"⛳ Set the tee box (stand on it)");
  setTee.style.marginTop="8px";
  setTee.onclick=()=>setTeeHere(hole);
  pinCard.appendChild(setTee);

  // set a dogleg/bend point — only meaningful once tee & green exist
  if(hole.tee && hole.green && !hole.approx){
    const setBend=el("button",S.placingBend?"btn btn-gold":"btn btn-ghost",
      S.placingBend?"👆 Now tap the corner on the map":(hole.bend?"↻ Move the dogleg point":"📐 Set the dogleg (tap the corner)"));
    setBend.style.marginTop="8px";
    setBend.onclick=()=>{ S.placingBend=!S.placingBend; if(ballMarker&&MAP){try{MAP.removeLayer(ballMarker);}catch(e){}ballMarker=null;} toast(S.placingBend?"Tap the corner of the dogleg on the map":"Dogleg placing cancelled"); render(); };
    pinCard.appendChild(setBend);
    if(hole.bend){
      const clr=el("button","del","Remove dogleg (make it straight)");
      clr.onclick=()=>{ removeBend(hole); };
      pinCard.appendChild(clr);
    }
  }

  // once both tee and green are set, show how the hole plays (bent path if there's a dogleg)
  if(hole.tee && hole.green && !hole.approx){
    const straight=metresToYards(dist(hole.tee,hole.green));
    const bent = hole.bend ? metresToYards(dist(hole.tee,hole.bend)+dist(hole.bend,hole.green)) : straight;
    // direction off the tee: toward the corner if there's a dogleg, else toward the green
    const aim = hole.bend || hole.green;
    const brg=bearing(hole.tee,aim);
    const compass=["N","NE","E","SE","S","SW","W","NW"][Math.round(brg/45)%8];
    const tg=el("div","");tg.style.cssText="margin-top:12px;padding:10px 12px;background:rgba(217,169,78,.12);border-radius:12px";
    tg.innerHTML=`<div class="mini muted" style="font-weight:700;text-transform:uppercase;letter-spacing:.1em">The hole plays</div>
      <div class="row between" style="margin-top:4px"><span class="serif" style="font-size:22px;font-weight:900;color:var(--cream)">${bent} yds</span>
      <span style="font-weight:700;color:var(--gold)">${hole.bend?'opens':'heading'} ${compass} (${Math.round(brg)}°)</span></div>
      <div class="mini muted" style="margin-top:4px">${hole.bend?`Dogleg — measured tee → corner → green (${straight} yds straight).`:'Straight-line tee to green.'}</div>`;
    pinCard.appendChild(tg);
  }
  w.appendChild(pinCard);

  const hint=el("div","card mini muted center",S.placingBend?"Tap the corner of the dogleg on the map to set where the hole bends.":"Tap anywhere on the map to measure a shot line from your position. Satellite view uses a free layer — no Google key needed.");
  w.appendChild(hint);
  return w;
}

let _mapTries=0;
function initMap(){
  const m=document.getElementById("map");
  if(!m) return;                          // not on GPS screen
  if(typeof L==="undefined"){             // Leaflet not ready yet
    _mapTries++;
    if(_mapTries<40){ setTimeout(initMap,150); }   // keep waiting (~6s)
    else { mapFallback(m); }               // give up -> graceful message
    return;
  }
  _mapTries=0;
  try{
    const {hole}=currentGpsHole();
    if(MAP){ try{MAP.remove();}catch(e){} MAP=null; }
    MAP=L.map("map",{zoomControl:false,attributionControl:false}).setView(hole.green,17);
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19}).addTo(MAP);
    L.control.zoom({position:"bottomright"}).addTo(MAP);
    greenMarker=L.marker(hole.green,{icon:flagIcon()}).addTo(MAP);
    // draw the hole's shape: tee -> (bend) -> green
    if(hole.tee){
      const path = hole.bend ? [hole.tee,hole.bend,hole.green] : [hole.tee,hole.green];
      holeLine=L.polyline(path,{color:"#d9a94e",weight:3,opacity:.85}).addTo(MAP);
      L.marker(hole.tee,{icon:teeIcon()}).addTo(MAP);
      if(hole.bend) L.marker(hole.bend,{icon:bendIcon()}).addTo(MAP);
      try{ MAP.fitBounds(L.latLngBounds(path).pad(0.25)); }catch(e){}
    }
    MAP.on("click",e=>{
      if(S.placingBend){ saveBendHere(hole,[e.latlng.lat,e.latlng.lng]); return; }
      if(ballMarker)MAP.removeLayer(ballMarker);
      ballMarker=L.marker(e.latlng,{icon:ballIcon()}).addTo(MAP);
      drawLine();
      updateShotCard(e.latlng);
    });
    if(userPos)placeUser(userPos);
    updateYards();
  }catch(err){
    console.warn("map init failed",err);
    mapFallback(m);
  }
}
function mapFallback(m){
  if(!m)return;
  m.style.height="auto";
  m.innerHTML=`<div style="padding:26px 18px;text-align:center;color:var(--cream-dim)">
    <div style="font-size:34px;margin-bottom:8px">🛰️</div>
    <div style="font-weight:600;color:var(--cream);margin-bottom:4px">Satellite map offline</div>
    <div class="mini">No connection to the map tiles right now. <b>Yardages below still work</b> from your GPS — the aerial view returns when you're back online.</div>
  </div>`;
}
function flagIcon(){return L.divIcon({className:"",html:`<div style="font-size:26px;transform:translate(-4px,-22px);filter:drop-shadow(0 2px 3px rgba(0,0,0,.6))">⛳</div>`});}
function ballIcon(){return L.divIcon({className:"",html:`<div style="width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid #c2643c;transform:translate(-7px,-7px);box-shadow:0 0 6px rgba(0,0,0,.5)"></div>`});}
function teeIcon(){return L.divIcon({className:"",html:`<div style="font-size:18px;transform:translate(-7px,-9px);filter:drop-shadow(0 1px 2px rgba(0,0,0,.7))">🟦</div>`});}
function bendIcon(){return L.divIcon({className:"",html:`<div style="width:13px;height:13px;border-radius:50%;background:#d9a94e;border:2px solid #fff;transform:translate(-7px,-7px);box-shadow:0 0 5px rgba(0,0,0,.6)"></div>`});}
function userIcon(){return L.divIcon({className:"",html:`<div style="width:18px;height:18px;border-radius:50%;background:#7fc3d6;border:3px solid #fff;transform:translate(-9px,-9px);box-shadow:0 0 10px #7fc3d6"></div>`});}

function startGps(){
  if(!navigator.geolocation){toast("No GPS on this device");return;}
  toast("Getting your location…");
  if(watchId)navigator.geolocation.clearWatch(watchId);
  let first=true;
  watchId=navigator.geolocation.watchPosition(p=>{
    userPos=[p.coords.latitude,p.coords.longitude];
    S.acc=p.coords.accuracy;
    if(first){ first=false; if(S.tab==="gps") { render(); return; } } // re-evaluate near/away gate once we have a fix
    placeUser(userPos);
    updateYards();
  },err=>{
    toast("Location blocked. Allow it in browser settings.");
  },{enableHighAccuracy:true,maximumAge:2000,timeout:10000});
}
function placeUser(pos){
  if(!MAP)return;
  if(posMarker)MAP.removeLayer(posMarker);
  posMarker=L.marker(pos,{icon:userIcon()}).addTo(MAP);
  if(accCircle)MAP.removeLayer(accCircle);
  if(S.acc)accCircle=L.circle(pos,{radius:S.acc,color:"#7fc3d6",weight:1,fillOpacity:.08}).addTo(MAP);
  MAP.setView(pos,17);
  drawLine();
}
function metresToYards(m){return Math.round(m*1.09361);}
function dist(a,b){
  // Haversine — does NOT depend on Leaflet, so yardages work even if the map fails
  const R=6371000, toRad=x=>x*Math.PI/180;
  const lat1=a[0]??a.lat, lon1=a[1]??a.lng, lat2=b[0]??b.lat, lon2=b[1]??b.lng;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const s=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function updateYards(){
  const {hole}=currentGpsHole();
  if(!userPos){return;}
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  const setHTML=(id,v)=>{const e=document.getElementById(id);if(e)e.innerHTML=v;};
  // only show distances when you're actually on/near this hole
  const near=onThisHole(hole);
  if(near===false){
    setHTML("yardmid",'<span style="font-size:18px;color:var(--cream-dim)">not on this hole</span>');
    set("ymid2","–");set("yfront","–");set("yback","–");
    const body=document.getElementById("plbody");
    if(body)body.innerHTML=`You're not at hole ${hole.n} right now — walk to the tee or green and the yardages appear.`;
    return;
  }
  const mid=hole.green;
  const dMid=dist(userPos,mid);
  const yMid=metresToYards(dMid);
  setHTML("yardmid",yMid+' <span style="font-size:18px;color:var(--cream-dim)">yds</span>');
  set("ymid2",yMid);
  set("yfront",Math.max(0,yMid-18));
  set("yback",yMid+18);
  updatePlaysLike(hole);
}

// Wind + elevation "plays like" advice
async function updatePlaysLike(hole){
  const body=document.getElementById("plbody");
  if(!body)return;
  if(!userPos){ return; }
  if(hole.approx){
    body.innerHTML=`Set this green (button below) to unlock wind & elevation advice for the shot.`;
    return;
  }
  const yards=metresToYards(dist(userPos,hole.green));
  // wind from current weather (load if needed)
  if(!WEATHER){ loadWeather(false); }
  const wspeed = WEATHER?.current?.wind_speed_10m;
  const wfrom  = WEATHER?.current?.wind_direction_10m;
  const shotBrg = bearing(userPos, hole.green);

  // elevation (cached). Fetch both points.
  body.innerHTML=`Crunching wind & elevation…`;
  const [eMe,eGreen]=await Promise.all([getElevation(userPos[0],userPos[1]), getElevation(hole.green[0],hole.green[1])]);
  const elevDelta = (eMe!=null&&eGreen!=null) ? (eGreen-eMe) : null;

  let along=0, cross=0, haveWind=false;
  if(wspeed!=null && wfrom!=null){ const wc=windComponents(shotBrg,wspeed,wfrom); along=wc.help; cross=wc.cross; haveWind=true; }

  const {plays,windYds,elevYds}=playsLike(yards, along, elevDelta||0);
  const delta=plays-yards;

  // build readout
  const windWord = !haveWind ? "" : (along<-1?`🟥 into wind`:along>1?`🟩 downwind`:`➡️ crosswind`);
  const crossWord = haveWind&&cross>=8 ? ` (strong ${Math.round(cross)}mph cross)` : haveWind&&cross>=4?` (${Math.round(cross)}mph cross)`:"";
  const elevWord = elevDelta==null?"":(elevDelta>1.5?`⛰ uphill ${Math.round(elevDelta)}m`:elevDelta<-1.5?`⤵ downhill ${Math.round(Math.abs(elevDelta))}m`:`flat`);

  const bits=[];
  if(haveWind)bits.push(`${windWord}${crossWord}${Math.abs(windYds)>=2?` ${windYds>0?'+':''}${windYds}y`:''}`);
  if(elevWord)bits.push(`${elevWord}${Math.abs(elevYds)>=2?` ${elevYds>0?'+':''}${elevYds}y`:''}`);

  body.innerHTML=`<div class="row between" style="align-items:flex-end">
      <div><div class="serif" style="font-size:30px;font-weight:900;color:var(--gold);line-height:1">${plays} <span style="font-size:15px;color:var(--cream-dim)">yds</span></div>
      <div class="mini muted">actual ${yards} yds</div></div>
      <div style="text-align:right"><div style="font-weight:700;color:var(--cream)">${clubNudge(delta)}</div>
      <div class="mini muted">${delta>0?'+':''}${delta} yd${Math.abs(delta)!==1?'s':''}</div></div>
    </div>
    ${bits.length?`<div class="mini muted" style="margin-top:8px">${bits.join(' · ')}</div>`:''}
    <div class="mini muted" style="margin-top:6px;opacity:.7">Rough guide only — wind on the ball is unpredictable.</div>`;
}
function drawLine(){
  if(!MAP||!userPos)return;
  if(lineLayer)MAP.removeLayer(lineLayer);
  const target=ballMarker?ballMarker.getLatLng():currentGpsHole().hole.green;
  lineLayer=L.polyline([userPos,target],{color:"#c8f04a",weight:2,dashArray:"6 6"}).addTo(MAP);
}
function updateShotCard(latlng){
  const sc=document.getElementById("shotcard");if(!sc)return;
  sc.classList.remove("hidden");
  const {hole}=currentGpsHole();
  let txt="";
  if(userPos){
    const toBall=metresToYards(dist(userPos,latlng));
    const ballToGreen=metresToYards(dist([latlng.lat,latlng.lng],hole.green));
    txt=`${toBall} yds out · ${ballToGreen} to green`;
  } else {
    const ballToGreen=metresToYards(dist([latlng.lat,latlng.lng],hole.green));
    txt=`${ballToGreen} yds to green (enable GPS for shot distance)`;
  }
  document.getElementById("shotdist").textContent=txt;
  document.getElementById("clearshot").onclick=()=>{if(ballMarker)MAP.removeLayer(ballMarker);ballMarker=null;if(lineLayer&&userPos)drawLine();sc.classList.add("hidden");};
}
async function setPinHere(hole){
  if(!userPos){toast("Tap 'Use my location' first");return;}
  hole.green=[...userPos];hole.approx=false;
  const {courseKey}=currentGpsHole();
  toast("Green set 🎯 saving for the group…");
  try{
    await cloudSavePin(courseKey,hole.n,userPos[0],userPos[1]);
    toast("Saved — every dad now has this green ✓");
  }catch(e){
    toast("Set on your phone (cloud save failed — will retry)");
  }
  initMap();
  render();
}
async function setTeeHere(hole){
  if(!userPos){toast("Tap 'Use my location' first");return;}
  hole.tee=[...userPos];
  const {courseKey}=currentGpsHole();
  toast("Tee set ⛳ saving for the group…");
  try{
    await cloudSavePin(courseKey,hole.n+100,userPos[0],userPos[1]); // tee stored as hole+100
    toast("Tee saved for the group ✓");
  }catch(e){
    toast("Set on your phone (cloud save failed — will retry)");
  }
  render();
}

// place a dogleg/bend point by tapping the map corner (stored as hole+200)
async function saveBendHere(hole, latlng){
  hole.bend=[latlng[0],latlng[1]];
  S.placingBend=false;
  const {courseKey}=currentGpsHole();
  toast("Dogleg set 📐 saving for the group…");
  try{
    await cloudSavePin(courseKey,hole.n+200,latlng[0],latlng[1]);
    toast("Dogleg saved for the group ✓");
  }catch(e){
    toast("Set on your phone (cloud save failed — will retry)");
  }
  render();
}
async function removeBend(hole){
  hole.bend=null;
  const {courseKey}=currentGpsHole();
  try{ await cloudDeletePin(courseKey,hole.n+200); }catch(e){}
  toast("Dogleg removed — hole is straight again");
  render();
}

// =================== BOOT ===================
render();
if(S.cloud&&S.cloud.groupId){ Promise.all([cloudPull(),loadPins()]).then(()=>{startSync();render();}); }
</script>
